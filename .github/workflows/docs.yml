name: Docs

on:
  push:
    branches: [ main, master, edgar-ci-update ]
      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      - name: Instantiate project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Build and deploy docs (Documenter will push)
        run: julia docs/make.jl
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      - name: Register package for docs
        run: julia -e 'using Pkg; Pkg.develop(path=pwd());'

      - name: Install docs dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.activate("docs"); Pkg.add("Documenter");'

      - name: Build docs
        run: julia --project=docs docs/make.jl

      - name: (optional) Completed - deploy handled by Documenter
        run: echo "If running in GitHub Actions, Documenter deploydocs() will push to gh-pages."
