name: Docs

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  workflow_dispatch:

# Documenter pushes the built docs to the gh-pages branch using GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - uses: julia-actions/cache@v2

      # Sanity check that the package itself resolves. The docs/ environment
      # (Documenter + EDGAR by path) is set up by docs/make.jl.
      - name: Instantiate package
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Build and deploy docs
        run: julia docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
